<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Safarr – Pune's #1 Auto Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0050ff;
      --navy: #0a1628;
      --white: #ffffff;
      --off-white: #f7f8fa;
      --gray: #8a9ab5;
      --gray-light: #e8ecf2;
      --radius: 24px;
      --accent: #0050ff;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; background: var(--white); color: var(--navy); overflow-x: hidden; }

    .page { min-height: 100vh; display: flex; flex-direction: column; }
    
    .header { padding: 30px 24px; display: flex; justify-content: center; }
    .logo { display: flex; align-items: center; gap: 12px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; }
    .logo-mark { width: 40px; height: 40px; background: var(--navy); border-radius: 12px; display: flex; align-items: center; justify-content: center; }

    .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; }
    .hero-title { font-family: 'Syne', sans-serif; font-size: clamp(2.5rem, 10vw, 4rem); font-weight: 800; line-height: 1; margin-bottom: 16px; }
    .hero-title span { color: var(--primary); }
    .hero-sub { color: var(--gray); font-size: 1.1rem; max-width: 400px; margin-bottom: 40px; line-height: 1.6; }

    .role-cards { display: grid; gap: 20px; width: 100%; max-width: 400px; }
    .role-card { background: var(--white); border: 2px solid var(--gray-light); border-radius: var(--radius); padding: 24px; display: flex; align-items: center; gap: 20px; text-decoration: none; color: inherit; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .role-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0, 80, 255, 0.1); }
    .role-card.primary { background: var(--navy); border-color: var(--navy); color: white; }
    .role-card.primary:hover { background: #14233a; }

    .card-icon { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; background: var(--off-white); font-size: 1.5rem; }
    .role-card.primary .card-icon { background: rgba(255,255,255,0.1); }
    .card-content h3 { font-family: 'Syne', sans-serif; margin-bottom: 4px; font-size: 1.1rem; }
    .card-content p { font-size: 0.85rem; opacity: 0.7; }

    .footer { padding: 40px 24px; text-align: center; color: var(--gray); font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="logo">
        <div class="logo-mark">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M3 14V8.5L7 5l4 2.5 4-2.5 2 3V14" stroke="white" stroke-width="2" stroke-linejoin="round" />
            <circle cx="6" cy="18" r="2" fill="#0050ff" />
            <circle cx="14" cy="18" r="2" fill="#0050ff" />
          </svg>
        </div>
        Safarr
      </div>
    </header>

    <main class="hero">
      <h1 class="hero-title">Ride Pune,<br><span>Your Way.</span></h1>
      <p class="hero-sub">The smartest way to book metered autos across the city.</p>

      <div class="role-cards">
        <a href="https://safarrauto.yahya.in" class="role-card primary">
          <div class="card-icon">🛺</div>
          <div class="card-content">
            <h3>I'm a Driver</h3>
            <p>Join Safarr, get rides, earn more.</p>
          </div>
        </a>
        <a href="https://safarruser.yahya.in" class="role-card">
          <div class="card-icon">👤</div>
          <div class="card-content">
            <h3>I'm a Passenger</h3>
            <p>Book reliable, metered autos instantly.</p>
          </div>
        </a>
      </div>
    </main>

    <footer class="footer">
      &copy; 2024 Safarr Pune. All rights reserved.
    </footer>
  </div>
</body>
</html>
